name: Deploy Frontend

on:
  workflow_run:
    workflows: [ "Test Frontend" ]
    types:
      - completed

jobs:
  deploy:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
            ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts

      - name: Download docker-compose.yml
        run: |
          curl -H "Accept: application/vnd.github.v3.raw" \
          -o docker-compose.yml \
          https://api.github.com/repos/TrefflyTeam/backend/contents/infra/docker-compose.yml

      - name: Copy docker-compose.yml to server
        run: |
          scp -o StrictHostKeyChecking=no ./docker-compose.yml \ 
          ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}:${{ secrets.APP_PATH }}/docker-compose.yml

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build Docker image for frontend
        run: |
          docker build -t g0dd0r0/treffly-client:latest ./front

      - name: Push Docker image to Docker Hub
        run: |
          docker push g0dd0r0/treffly-client:latest

      - name: Deploy frontend to server
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} << 'ENDSSH'
          cd ${{ secrets.APP_PATH }} &&
          docker-compose pull front &&
          docker-compose up -d front
          ENDSSH